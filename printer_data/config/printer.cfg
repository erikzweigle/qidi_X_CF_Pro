[include mainsail.cfg]

# host MCU service is preinstalled and ready to use with:
[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_330025000751313339373836-if00


[printer]
kinematics: cartesian
max_velocity: 250
max_accel: 5000
max_z_velocity: 15
max_z_accel: 150
square_corner_velocity: 5.0
minimum_cruise_ratio: 0.5

[include OrbitoolO2.cfg]
[exclude_object]
[include KAMP_Settings.cfg]
[include macros.cfg]
[include exhaust_fan.cfg]
[gcode_arcs]
resolution: 0.1

[virtual_sdcard]
path: /home/biqu/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

# Motor1
[stepper_x]
step_pin: PC7
dir_pin: PC8
enable_pin: !PD2
microsteps: 64
rotation_distance: 34.0
full_steps_per_rotation: 200
endstop_pin: !PC15
position_endstop: 301
position_max: 302
position_min: 0
homing_speed: 50
second_homing_speed: 5

[tmc2209 stepper_x]
uart_pin: PC6
interpolate: false
run_current: 0.40
sense_resistor: 0.110
stealthchop_threshold: 999999 #stealthchop

# Motor2
[stepper_y]
step_pin: PG13
dir_pin: PG12
enable_pin: !PG15
microsteps: 64
rotation_distance: 34.0
full_steps_per_rotation: 200
endstop_pin: !PF1
position_endstop: -3.5
position_min: -4.5
position_max: 250
homing_speed: 50
second_homing_speed: 5

[tmc2209 stepper_y]
uart_pin: PG14
interpolate: false
run_current: 0.40
sense_resistor: 0.110
stealthchop_threshold: 999999 #stealthchop

# Motor3
[stepper_z]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD6
microsteps: 32
rotation_distance: 8
full_steps_per_rotation: 200
endstop_pin: !PF0
#position_endstop: 298.50
position_max: 310
position_min: -3.5
homing_speed: 10
second_homing_speed: 5
homing_retract_dist: 3

[tmc2209 stepper_z]
uart_pin: PD5
interpolate: false
run_current: 0.37
sense_resistor: 0.110
stealthchop_threshold: 999999 #stealthchop

[stepper_z1]
step_pin: PB4
dir_pin: !PB3
enable_pin: !PB6
microsteps: 32
rotation_distance: 8
full_steps_per_rotation: 200 
#endstop_pin: !PF2
#endstop_pin: probe:z_virtual_endstop

[tmc2209 stepper_z1]
uart_pin: PB5
interpolate: false
run_current: 0.37
sense_resistor: 0.110
stealthchop_threshold: 999999 #stealthchop


[extruder]
step_pin = orbitoolO2:PB7
dir_pin = orbitoolO2:PB6 
enable_pin = !orbitoolO2:PB4
microsteps = 32
rotation_distance = 4.69
full_steps_per_rotation = 200
nozzle_diameter = 0.400
filament_diameter = 1.750
heater_pin = orbitoolO2:PA0
sensor_pin = orbitoolO2:PA3
pullup_resistor = 2200
sensor_type = PT1000 
min_temp = 0
max_temp = 300 # hotend speciffic
pressure_advance_smooth_time = 0.03
max_extrude_only_distance = 500.0
max_extrude_cross_section = 20
min_extrude_temp = 180
smooth_time = 0.5
max_power: 0.995 # limit heater power to 99.5% to enable autorecovery from short detection
pwm_cycle_time: 0.00500
# control = pid
# pid_Kp=23.145 
# pid_Ki=1.513 
# pid_Kd=88.532

[tmc2209 extruder]
uart_pin: orbitoolO2:PB5
interpolate = False
run_current = 0.8 
sense_resistor = 0.11
stealthchop_threshold = 0


[heater_bed]
heater_pin: PF5
sensor_pin: PB1  #TB
sensor_type: EPCOS 100K B57560G104F
pullup_resistor: 4320 
max_power: 1.0
smooth_time: 1.0
min_temp: 0
max_temp: 125
#control: pid
#pid_Kp: 53.319
#pid_Ki: 0.741
#pid_Kd: 959.749

[idle_timeout]
timeout: 1800

[output_pin power]
pin: PD14
value: 1
shutdown_value: 0

# Fans
[temperature_fan MCU_fan]
pin: PF7
kick_start_time: 0.8
off_below: 0.1
max_power: 1.0
sensor_type: temperature_host
control: pid
min_temp: 10
max_temp: 100
pid_kp: 1.0
pid_ki: 0.5
pid_kd: 2.0
pid_deriv_time: 2.0
off_below: 0.1
min_speed: 0.0
max_speed: 0.99
target_temp: 65

[controller_fan Stepper_Fan]                                      
pin: PA4
kick_start_time: 0.5 
fan_speed: 0.99                                             
stepper: stepper_x, stepper_y, stepper_z


## Illumination - Chamber LED
[led Chamber_LED]
white_pin: PF8
cycle_time: 0.010
initial_WHITE: 1.0

## Power Button - Frame LED
[led Power_Button_LED]
white_pin: PF6
cycle_time: 0.010
initial_WHITE: 1.0

[bltouch]
sensor_pin: ^orbitoolO2:PB3
control_pin: orbitoolO2:PA15
x_offset:-28
y_offset:0.0
# z_offset:2.5
samples: 1
speed: 10.0

[bed_mesh]
speed: 50
horizontal_move_z: 5
mesh_min: 5,10
mesh_max: 220,200
probe_count: 5,5
mesh_pps: 2,2
zero_reference_position: 122,125
fade_start: 1
fade_end: 10
fade_target: 0
algorithm: lagrange

[temperature_sensor Manta8P_V2]
sensor_type: temperature_mcu
min_temp: 10
max_temp: 100

[temperature_sensor CB1_+eMMC]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

[mcu cb1]                                            # Expose GPIO pins for cb1 by running klipper as well as secondary MCU code
serial: /tmp/klipper_host_mcu                        # https://www.klipper3d.org/RPi_microcontroller.html


[gcode_macro SHUTDOWN]
gcode:
  SET_PIN PIN=power VALUE=0
  # {action_call_remote_method("shutdown_machine")}

